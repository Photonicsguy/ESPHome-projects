esphome:
  name: esp8266
  friendly_name: ESP8266
  name_add_mac_suffix: true
  project:
    name: 'https://github.com/Photonicsguy/ESPHome-projects'
    version: "0.1"

esp8266:
  board: esp01_1m
logger:
  baud_rate: 0

api:
  #encryption:
  #  key: !secret enc_key
ota:
  platform: esphome
  #password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: !secret wifi_domain
  min_auth_mode: WPA2
  ap:
    ssid: "blank ESP8266 Fallback"
    password: "12345678"
captive_portal:


dashboard_import:
  package_import_url: github://Photonicsguy/ESPhome-projects/tpl/blankESP8266.yaml@main
  import_full_config: True

time:
  - platform: homeassistant
    id: hass_time

button:
  - platform: restart
    id: btnRestart
    name: "Reboot"
    entity_category: "diagnostic"

light: #GPIO02 Blue Led
  - platform: status_led
    name: "Status"
    entity_category: "diagnostic"
    icon: mdi:alarm-light
    pin:
      number: GPIO02
      inverted: true

sensor:
  - platform: wifi_signal
    name: "RSSI"
    id: rssi_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: uptime
    name: Boot
    entity_category: "diagnostic"
    type: timestamp
